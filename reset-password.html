<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#F4A438"/>
  <title>Reset Password | Giftmate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #160B10;
      color: #FFEDF5;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .wrap { width: 100%; max-width: 380px; }
    .hero { text-align: center; margin-bottom: 24px; }
    .badge {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #CC6050, #F0A090);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
    }
    h1 {
      font-family: Georgia, serif;
      font-size: 30px;
      font-weight: 900;
      color: #FFEDF5;
    }
    .sub { color: #B08090; font-size: 14px; margin-top: 6px; }
    .card {
      background: #241220;
      border: 1px solid #F0A09028;
      border-radius: 20px;
      padding: 28px;
    }
    input {
      width: 100%;
      background: #160B10;
      border: 1px solid #F0A09028;
      border-radius: 10px;
      padding: 12px 14px;
      color: #FFEDF5;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 0;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }
    .primary {
      background: linear-gradient(135deg, #CC6050, #F0A090);
      color: #000;
      margin-bottom: 10px;
    }
    .secondary {
      background: transparent;
      color: #B08090;
    }
    .message {
      font-size: 13px;
      margin-bottom: 12px;
      text-align: center;
      border-radius: 8px;
      padding: 10px;
    }
    .error {
      color: #FF6B6B;
      background: rgba(255, 107, 107, 0.08);
    }
    .success {
      color: #4ADE80;
      background: rgba(74, 222, 128, 0.08);
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">🔐</div>
      <h1>Reset your password</h1>
      <div class="sub" id="subtitle">Choose a new password to get back into Giftmate.</div>
    </div>
    <div class="card">
      <div id="message" class="message hidden"></div>
      <form id="reset-form">
        <input id="password" type="password" placeholder="New password" autocomplete="new-password"/>
        <input id="confirm-password" type="password" placeholder="Confirm new password" autocomplete="new-password"/>
        <button class="primary" id="submit-button" type="submit">Update password</button>
      </form>
      <button class="secondary" id="secondary-button" type="button">Back to Giftmate</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://xpvvutfojaqtrybwlnph.supabase.co";
    const SUPABASE_KEY = "sb_publishable_S1FnE9dxWOZCZ77Bm93SSg_ObsDrMVc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById("reset-form");
    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirm-password");
    const message = document.getElementById("message");
    const subtitle = document.getElementById("subtitle");
    const submitButton = document.getElementById("submit-button");
    const secondaryButton = document.getElementById("secondary-button");

    function showMessage(text, kind) {
      message.textContent = text;
      message.className = `message ${kind}`;
    }

    function getAuthUrlParams() {
      const searchParams = new URLSearchParams(window.location.search);
      const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
      const hashParams = new URLSearchParams(hash);
      const merged = new URLSearchParams(searchParams.toString());
      for (const [key, value] of hashParams.entries()) merged.set(key, value);
      return merged;
    }

    function clearRecoveryUrl() {
      window.history.replaceState({}, document.title, "/reset-password.html");
    }

    async function initializeRecoverySession() {
      const params = getAuthUrlParams();
      const errorDescription = params.get("error_description");
      const errorCode = params.get("error_code");

      if (errorDescription || errorCode) {
        throw new Error(errorDescription || errorCode || "Reset link expired");
      }

      if (params.get("code")) {
        const { data, error } = await sb.auth.exchangeCodeForSession(params.get("code"));
        if (error) throw error;
        return data.session;
      }

      if (params.get("token_hash") && params.get("type") === "recovery") {
        const { data, error } = await sb.auth.verifyOtp({
          token_hash: params.get("token_hash"),
          type: "recovery"
        });
        if (error) throw error;
        return data.session;
      }

      const { data } = await sb.auth.getSession();
      if (data.session) return data.session;

      throw new Error("Reset link invalid or expired. Please request a new one.");
    }

    async function boot() {
      try {
        await initializeRecoverySession();
        clearRecoveryUrl();
      } catch (error) {
        form.classList.add("hidden");
        subtitle.textContent = "This reset link is invalid or expired. Request a new email and try again.";
        showMessage(error.message || "Reset link invalid or expired.", "error");
        secondaryButton.textContent = "Back to Giftmate";
      }
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (password.length < 8) {
        showMessage("Use at least 8 characters.", "error");
        return;
      }
      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Updating...";
      showMessage("", "hidden");

      try {
        const { error } = await sb.auth.updateUser({ password });
        if (error) throw error;
        showMessage("Password updated. Redirecting you back into the app.", "success");
        setTimeout(() => {
          window.location.href = "/";
        }, 1200);
      } catch (error) {
        showMessage(error.message || "Couldn't update your password.", "error");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Update password";
      }
    });

    secondaryButton.addEventListener("click", async () => {
      try { await sb.auth.signOut(); } catch (e) {}
      window.location.href = "/";
    });

    boot();
  </script>
</body>
</html>
