<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giftmate — Back soon ✨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0A0A18;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #F0F0FF;
      padding: 20px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
      background: #12122A;
      border: 1px solid #F4A43844;
      border-radius: 24px;
      padding: 48px 32px;
    }
    .logo { font-size: 22px; font-weight: 900; margin-bottom: 32px; letter-spacing: -0.5px; }
    .logo span { color: #F4A438; }
    .emoji { font-size: 64px; margin-bottom: 20px; display: block; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 12px; color: #F0F0FF; }
    p { color: #9090B0; font-size: 15px; line-height: 1.6; margin-bottom: 8px; }
    .tag {
      display: inline-block;
      margin-top: 28px;
      background: #F4A43822;
      border: 1px solid #F4A43844;
      color: #FFD580;
      border-radius: 99px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 700;
    }
    .dots { display: flex; gap: 6px; justify-content: center; margin-top: 28px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #F4A438; animation: pulse 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">gift<span>mate</span></div>
    <span class="emoji">🎁</span>
    <h1>We're wrapping something special</h1>
    <p>Our elves are hard at work making Giftmate even more magical.</p>
    <p>Back before you can say "what should I get them?"</p>
    <div class="tag">⚡ Back in a few minutes</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
