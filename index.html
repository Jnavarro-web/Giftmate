<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#F4A438" id="theme-color-meta"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Giftmate"/>
  <title>Giftmate 🎁</title>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://giftmate-sigma.vercel.app"/>
  <meta property="og:title" content="Giftmate 🎁 — The social gifting app"/>
  <meta property="og:description" content="AI-powered gift ideas for every occasion. Follow friends, never miss a birthday, give the perfect gift every time."/>
  <meta property="og:image" content="https://giftmate-sigma.vercel.app/og-image.png"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://giftmate-sigma.vercel.app/og-image.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@900&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0A18; font-family: 'DM Sans', system-ui, sans-serif; }
    #root { min-height: 100vh; }
    #splash { position:fixed;inset:0;background:#0A0A18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease; }
    #splash p { color:#F4A438;font-family:Georgia,serif;font-style:italic;font-size:22px;font-weight:700;margin-top:16px; }
    input,button,select,textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="splash">
    <svg width="80" height="80" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="22" fill="#F4A438" id="splash-circle"/>
      <text x="22" y="20" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-weight="900" font-size="11" fill="#0A0A18" letter-spacing="0.5">gift</text>
      <text x="22" y="32" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="13.5" fill="#0A0A18" letter-spacing="0.8">MATE</text>
    </svg>
    <p id="splash-title">Giftmate</p>
  </div>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="./app.js"></script>

  <script>
    (function() {
      var themes = {
        midnight:{bg:"#0A0A18",gold:"#F4A438"},
        rose:{bg:"#150A10",gold:"#FF6B9D"},
        lavender:{bg:"#0E0A18",gold:"#C084FC"},
        blush:{bg:"#180C10",gold:"#FB7EA8"},
        ocean:{bg:"#08121E",gold:"#38BDF8"},
        sage:{bg:"#081408",gold:"#4ADE80"}
      };
      try {
        var key = localStorage.getItem("giftmate_theme") || "midnight";
        var th = themes[key] || themes.midnight;
        document.body.style.background = th.bg;
        var splash = document.getElementById("splash");
        if (splash) splash.style.background = th.bg;
        var circle = document.getElementById("splash-circle");
        if (circle) circle.setAttribute("fill", th.gold);
        var title = document.getElementById("splash-title");
        if (title) title.style.color = th.gold;
        var meta = document.getElementById("theme-color-meta");
        if (meta) meta.content = th.gold;
      } catch(e) {}
    })();

    // Force-remove splash after 800ms on load (normal path)
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.style.opacity = '0'; setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 400); }
      }, 800);

      // Hard fallback: if splash is still visible after 4s, something crashed — remove it
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s && s.parentNode) s.parentNode.removeChild(s);
      }, 4000);

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          // When a new SW takes over, reload the page to get fresh assets
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'activated') {
                  window.location.reload();
                }
              });
            }
          });
        }).catch(function(){});
        // Also reload if controller changes (SW swap mid-session)
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });
      }
    });
  </script>
</body>
</html>
